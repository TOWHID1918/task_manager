<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #223351 0%, #788bab 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            animation: fadeIn 0.8s ease-out;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255,255,255,0.95);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card h3 {
            color: #1e3c72;
            font-size: 2em;
            margin-bottom: 5px;
        }

        .stat-card p {
            color: #666;
            font-size: 0.9em;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
            animation: slideUp 0.8s ease-out;
        }

        .form-section {
            background: rgba(255,255,255,0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .form-section h2 {
            color: #1e3c72;
            margin-bottom: 20px;
            font-size: 1.8em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #2a5298;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .btn {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s ease;
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .tasks-section {
            background: rgba(255,255,255,0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .tasks-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .tasks-header h2 {
            color: #1e3c72;
            font-size: 1.8em;
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 2px solid #2a5298;
            background: transparent;
            color: #2a5298;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .filter-btn.active,
        .filter-btn:hover {
            background: #2a5298;
            color: white;
        }

        .tasks-list {
            max-height: 500px;
            overflow-y: auto;
        }

        .task-card {
            background: white;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 12px;
            border-left: 5px solid #2a5298;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            animation: taskSlideIn 0.3s ease-out;
        }

        .task-card:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .task-card.completed {
            opacity: 0.7;
            border-left-color: #4CAF50;
        }

        .task-card.pending {
            border-left-color: #FFC107;
        }

        .task-card.in-progress {
            border-left-color: #2196F3;
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 10px;
        }

        .task-title {
            font-size: 1.3em;
            color: #1e3c72;
            font-weight: 600;
            flex: 1;
        }

        .task-status {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            text-transform: uppercase;
        }

        .task-status.pending {
            background: #FFF3CD;
            color: #856404;
        }

        .task-status.in-progress {
            background: #D1ECF1;
            color: #0C5460;
        }

        .task-status.completed {
            background: #D4EDDA;
            color: #155724;
        }

        .task-description {
            color: #666;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .task-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9em;
            color: #999;
            margin-bottom: 15px;
        }

        .task-actions {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            padding: 8px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .edit-btn {
            background: #2196F3;
            color: white;
        }

        .delete-btn {
            background: #f44336;
            color: white;
        }

        .complete-btn {
            background: #4CAF50;
            color: white;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state img {
            font-size: 4em;
            margin-bottom: 20px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes taskSlideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .filter-buttons {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 Task Manager </h1>
            <p class="subtitle">Manage your tasks </p>
        </header>

        <div class="dashboard">
            <div class="stat-card">
                <h3 id="totalTasks">0</h3>
                <p>Total Tasks</p>
            </div>
            <div class="stat-card">
                <h3 id="pendingTasks">0</h3>
                <p>Pending</p>
            </div>
            <div class="stat-card">
                <h3 id="inProgressTasks">0</h3>
                <p>In Progress</p>
            </div>
            <div class="stat-card">
                <h3 id="completedTasks">0</h3>
                <p>Completed</p>
            </div>
        </div>

        <div class="main-content">
            <div class="form-section">
                <h2 id="formTitle">➕ Add New Task</h2>
                <form id="taskForm">
                    <input type="hidden" id="taskId">
                    <div class="form-group">
                        <label for="taskTitle">Task Title</label>
                        <input type="text" id="taskTitle" required placeholder="Enter task title">
                    </div>
                    <div class="form-group">
                        <label for="taskDescription">Description</label>
                        <textarea id="taskDescription" required placeholder="Enter task description"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="taskStatus">Status</label>
                        <select id="taskStatus" required>
                            <option value="pending">Pending</option>
                            <option value="in-progress">In Progress</option>
                            <option value="completed">Completed</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="taskPriority">Priority</label>
                        <select id="taskPriority" required>
                            <option value="low">Low</option>
                            <option value="medium">Medium</option>
                            <option value="high">High</option>
                        </select>
                    </div>
                    <button type="submit" class="btn" id="submitBtn">Add Task</button>
                </form>
            </div>

            <div class="tasks-section">
                <div class="tasks-header">
                    <h2>📝 Your Tasks</h2>
                    <div class="filter-buttons">
                        <button class="filter-btn active" data-filter="all">All</button>
                        <button class="filter-btn" data-filter="pending">Pending</button>
                        <button class="filter-btn" data-filter="in-progress">Progress</button>
                        <button class="filter-btn" data-filter="completed">Done</button>
                    </div>
                </div>
                <div class="tasks-list" id="tasksList">
                    <div class="empty-state">
                        <div style="font-size: 4em;">📭</div>
                        <h3>No tasks yet</h3>
                        <p>Create your first task to get started!</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Database Management System using Objects
        class TaskDatabase {
            constructor() {
                this.tasks = this.loadFromStorage();
                this.nextId = this.getNextId();
            }

            loadFromStorage() {
                const data = localStorage.getItem('taskDB');
                return data ? JSON.parse(data) : [];
            }

            saveToStorage() {
                localStorage.setItem('taskDB', JSON.stringify(this.tasks));
            }

            getNextId() {
                if (this.tasks.length === 0) return 1;
                return Math.max(...this.tasks.map(t => t.id)) + 1;
            }

            create(taskData) {
                const task = {
                    id: this.nextId++,
                    title: taskData.title,
                    description: taskData.description,
                    status: taskData.status,
                    priority: taskData.priority,
                    createdAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString()
                };
                this.tasks.push(task);
                this.saveToStorage();
                return task;
            }

            read(id = null) {
                if (id) {
                    return this.tasks.find(t => t.id === id);
                }
                return this.tasks;
            }

            update(id, taskData) {
                const index = this.tasks.findIndex(t => t.id === id);
                if (index !== -1) {
                    this.tasks[index] = {
                        ...this.tasks[index],
                        ...taskData,
                        updatedAt: new Date().toISOString()
                    };
                    this.saveToStorage();
                    return this.tasks[index];
                }
                return null;
            }

            delete(id) {
                const index = this.tasks.findIndex(t => t.id === id);
                if (index !== -1) {
                    this.tasks.splice(index, 1);
                    this.saveToStorage();
                    return true;
                }
                return false;
            }

            filter(criteria) {
                return this.tasks.filter(task => {
                    for (let key in criteria) {
                        if (task[key] !== criteria[key]) return false;
                    }
                    return true;
                });
            }

            getStats() {
                return {
                    total: this.tasks.length,
                    pending: this.filter({ status: 'pending' }).length,
                    inProgress: this.filter({ status: 'in-progress' }).length,
                    completed: this.filter({ status: 'completed' }).length
                };
            }
        }

        // Initialize Database
        const db = new TaskDatabase();
        let currentFilter = 'all';
        let editingTaskId = null;

        // DOM Elements
        const taskForm = document.getElementById('taskForm');
        const tasksList = document.getElementById('tasksList');
        const filterButtons = document.querySelectorAll('.filter-btn');

        // Update Statistics
        function updateStats() {
            const stats = db.getStats();
            document.getElementById('totalTasks').textContent = stats.total;
            document.getElementById('pendingTasks').textContent = stats.pending;
            document.getElementById('inProgressTasks').textContent = stats.inProgress;
            document.getElementById('completedTasks').textContent = stats.completed;
        }

        // Render Tasks
        function renderTasks(filter = 'all') {
            const tasks = filter === 'all' ? db.read() : db.filter({ status: filter });
            
            if (tasks.length === 0) {
                tasksList.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size: 4em;">📭</div>
                        <h3>No tasks found</h3>
                        <p>Try adding a new task or changing the filter!</p>
                    </div>
                `;
                return;
            }

            tasksList.innerHTML = tasks.map(task => `
                <div class="task-card ${task.status}">
                    <div class="task-header">
                        <div class="task-title">${task.title}</div>
                        <span class="task-status ${task.status}">${task.status}</span>
                    </div>
                    <div class="task-description">${task.description}</div>
                    <div class="task-meta">
                        <span>Priority: <strong>${task.priority.toUpperCase()}</strong></span>
                        <span>${new Date(task.createdAt).toLocaleDateString()}</span>
                    </div>
                    <div class="task-actions">
                        ${task.status !== 'completed' ? `<button class="action-btn complete-btn" onclick="completeTask(${task.id})">✓ Complete</button>` : ''}
                        <button class="action-btn edit-btn" onclick="editTask(${task.id})">✎ Edit</button>
                        <button class="action-btn delete-btn" onclick="deleteTask(${task.id})">🗑 Delete</button>
                    </div>
                </div>
            `).join('');
        }

        // Add/Update Task
        taskForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const taskData = {
                title: document.getElementById('taskTitle').value,
                description: document.getElementById('taskDescription').value,
                status: document.getElementById('taskStatus').value,
                priority: document.getElementById('taskPriority').value
            };

            if (editingTaskId) {
                db.update(editingTaskId, taskData);
                editingTaskId = null;
                document.getElementById('formTitle').textContent = '➕ Add New Task';
                document.getElementById('submitBtn').textContent = 'Add Task';
            } else {
                db.create(taskData);
            }

            taskForm.reset();
            updateStats();
            renderTasks(currentFilter);
        });

        // Edit Task
        function editTask(id) {
            const task = db.read(id);
            if (task) {
                editingTaskId = id;
                document.getElementById('taskTitle').value = task.title;
                document.getElementById('taskDescription').value = task.description;
                document.getElementById('taskStatus').value = task.status;
                document.getElementById('taskPriority').value = task.priority;
                document.getElementById('formTitle').textContent = '✎ Edit Task';
                document.getElementById('submitBtn').textContent = 'Update Task';
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        // Delete Task
        function deleteTask(id) {
            if (confirm('Are you sure you want to delete this task?')) {
                db.delete(id);
                updateStats();
                renderTasks(currentFilter);
            }
        }

        // Complete Task
        function completeTask(id) {
            db.update(id, { status: 'completed' });
            updateStats();
            renderTasks(currentFilter);
        }

        // Filter Tasks
        filterButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                filterButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderTasks(currentFilter);
            });
        });

        // Initial Render
        updateStats();
        renderTasks();
    </script>
</body>
</html>
